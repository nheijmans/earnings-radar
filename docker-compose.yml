services:
  earnings-radar:
    build: .
    env_file: .env
    environment:
      # Keep state on the named volume so dedup survives restarts.
      STATE_DB_PATH: /data/earnings-radar.db
      # Emit a JSON event per detected filing for the analysis agent to consume.
      EVENTS_DIR: /events
    volumes:
      - radar-data:/data
      # Shared with the statixs-agency earnings_analyst runner (read-only there).
      - ./events:/events
    restart: unless-stopped
    # Run one pass immediately, then every 4 hours (14400s). Change the sleep
    # to re-tune the cadence. `restart: unless-stopped` brings it back after a
    # host reboot.
    entrypoint: ["sh", "-c", "while true; do python earnings_radar.py; sleep 14400; done"]

volumes:
  radar-data:
